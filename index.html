<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BridgeCoach</title>

    <style>
        body{
            margin:0;
            background:#f4f0e8;
            font-family:Arial, Helvetica, sans-serif;
            text-align:center;
        }

        header{
            background:#0f4c81;
            color:white;
            padding:30px;
        }

        h1{
            margin:0;
            font-size:48px;
        }

        h2{
            color:#0f4c81;
        }

        .container{
            width:90%;
            max-width:900px;
            margin:40px auto;
        }

        .button{
            display:block;
            width:320px;
            margin:20px auto;
            padding:18px;
            font-size:22px;
            border:none;
            border-radius:12px;
            background:#0f4c81;
            color:white;
            cursor:pointer;
            transition:0.2s;
        }

        .button:hover{
            background:#1462a4;
        }

        footer{
            margin-top:60px;
            color:#666;
            font-size:14px;
        }

    </style>
</head>

<body>

<header>

<h1>BridgeCoach</h1>

<p>De digitale bridgecoach voor biedtraining, afspel en tegenspel</p>

</header>

<div class="container">

<h2>Welkom</h2>

<p>

Dit is de eerste werkende versie van BridgeCoach.

</p>

<button class="button">

Module 1 - 1SA

</button>

<button class="button">

Module 2 - Controlebiedingen

</button>

<button class="button">

Instellingen

</button>

</div>

<footer>

BridgeCoach v4.1

</footer>

</body>
</html>
